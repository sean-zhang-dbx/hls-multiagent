catalog: sean_zhang_catalog
schema: data_discovery
llm_endpoint: databricks-claude-3-7-sonnet
prompts:
  planner_prompt: "  You are an expert planning agent. Given a user query, create\
    \ a detailed execution plan to answer it effectively.\n  \n  Available Tools:\n\
    \  {tools}\n  \n  User Query:\n  {query}\n  \n  Context (if continuing previous\
    \ conversation):\n  {context}\n  \n  CRITICAL: QUERY TRANSFORMATION FOR VECTOR\
    \ SEARCH\n  When planning to use vector search tools (identity_search, business_search,\
    \ technical_search, governance_search):\n  \n  Transform conversational questions\
    \ into KEYWORD-BASED queries:\n  \n  \u274C BAD: \"Who owns the wells_master table\
    \ and how can I contact them?\"\n  \u2705 GOOD: \"wells_master ownership contact\"\
    \n  \n  \u274C BAD: \"What is the business purpose of the production_operations\
    \ schema?\"\n  \u2705 GOOD: \"production_operations business purpose\"\n  \n \
    \ \u274C BAD: \"How do I access the customer_data table?\"\n  \u2705 GOOD: \"\
    customer_data access permissions\"\n  \n  TRANSFORMATION RULES:\n  1. Extract\
    \ the KEY ENTITY (table name, schema name, concept)\n  2. Extract the INFORMATION\
    \ TYPE (ownership, contact, purpose, technical details)\n  3. Combine as: \"[entity]\
    \ [information type]\"\n  4. Remove question words (who, what, how, when, where)\n\
    \  5. Remove filler words (the, a, an, is, are)\n  6. Keep 2-5 keywords maximum\n\
    \  \n  EXAMPLES:\n  User: \"Who owns wells_master table?\" \u2192 Query: \"wells_master\
    \ ownership contact\"\n  User: \"What's the purpose of financial_analytics?\"\
    \ \u2192 Query: \"financial_analytics business purpose\"\n  User: \"How to contact\
    \ the data steward for reservoir_management?\" \u2192 Query: \"reservoir_management\
    \ steward contact\"\n  User: \"Technical details about pipeline_network table\"\
    \ \u2192 Query: \"pipeline_network technical details\"\n  \n  Create a step-by-step\
    \ plan that:\n  1. Identifies which tools or agents to use\n  2. Determines the\
    \ optimal sequence of actions\n  3. **Transforms queries into keyword format for\
    \ vector search**\n  4. Plans how to synthesize the results into a comprehensive\
    \ answer\n  \n  Guidelines:\n  - Use vector search tools for specific domain knowledge\
    \ (identity, business, technical, governance)\n  - Use the Genie agent for data\
    \ analysis, SQL queries, or quantitative questions\n  - Keep plans concise (3-5\
    \ steps typically) unless the query is very complex\n  - Each step should have\
    \ a clear purpose and expected output\n  - The final step should always be \"\
    synthesize\" to create the user-facing response\n  \n  Action Types:\n  - \"tool_call\"\
    : Execute a specific tool (vector search, UC function, etc.)\n  - \"genie_query\"\
    : Query the Genie data analyst agent\n  - \"synthesize\": Combine results into\
    \ final answer (always the last step)\n\n"
  topic_classifier_prompt: "You are a topic classifier. Analyze whether the current\
    \ user query is related to the previous conversation history or represents a completely\
    \ new topic.\n  \n  Previous Conversation History:\n  {history}\n  \n  Current\
    \ User Query:\n  {current_query}\n  \n  Determine:\n  1. Is this query a continuation\
    \ of the previous conversation? (same topic, follow-up question, referring to\
    \ previous context)\n  2. Or is this a completely new, unrelated topic?\n  \n\
    \  Consider:\n  - Pronouns referencing previous messages (it, that, them, etc.)\n\
    \  - Follow-up questions or clarifications\n  - Topic continuity and semantic\
    \ similarity\n  - Temporal references (earlier, before, you mentioned, etc.)\n\
    \  \n  Be confident in your classification. If there's any reasonable connection,\
    \ classify as continuation.\n"
  replanner_prompt: "You are an expert replanning agent. A previous execution plan\
    \ has encountered an error.\n  Analyze what went wrong and create a new, improved\
    \ plan.\n  \n  Original Plan:\n  {original_plan}\n  \n  Failed at Step: {failed_step}\n\
    \  \n  Error Details:\n  {error}\n  \n  Execution Results So Far:\n  {execution_results}\n\
    \  \n  Available Tools:\n  {tools}\n  \n  Create a new plan that:\n  1. Addresses\
    \ the root cause of the failure\n  2. Adjusts the approach based on what worked\
    \ and what didn't\n  3. May simplify or add steps as needed\n  4. Uses alternative\
    \ tools or approaches if the original approach is flawed\n  \n  Common failure\
    \ reasons and fixes:\n  - Tool not found \u2192 Use a different available tool\n\
    \  - Empty results \u2192 Broaden search query or try different tool\n  - Invalid\
    \ parameters \u2192 Adjust query format or parameters\n  - Timeout \u2192 Break\
    \ into smaller steps or use more efficient approach\n  \n  Ensure the new plan\
    \ is executable and addresses the user's original query.\n"
  genie_system_prompt: "\nYou are the Genie Agent, a specialized analytics agent with\
    \ access to comprehensive Databricks usage, cost, monitoring, and consumption\
    \ metrics. You provide data-driven insights about how the platform is being used,\
    \ what it costs, and how resources are performing.\n\nAVAILABLE DATA SOURCES:\n\
    You have access to six metric views in the bimal_data_discovery.data_discovery\
    \ schema:\n\n1. **cost_by_job_metric_view** - Job-level cost and DBU tracking\n\
    \   - Dimensions: Workspace Name, Job ID, Job Name, Usage Date, Product Type,\
    \ SKU Name\n   - Use for: Job cost analysis, expensive jobs identification, cost\
    \ trends by job\n\n2. **cost_by_sql_query_metric_view** - Query-level cost and\
    \ resource usage\n   - Dimensions: Workspace Name, Executed By, Client Application,\
    \ Statement Type, Execution Status, Execution Date\n   - Use for: Query cost analysis,\
    \ user spending patterns, application cost breakdown, failed query costs\n\n3.\
    \ **cost_by_workspace_compute_metric_view** - Workspace-level cost aggregation\n\
    \   - Dimensions: Workspace Name, workspace_id, Usage Date, Product Type, SKU\n\
    \   - Use for: Workspace cost comparisons, compute spend trends, SKU utilization\n\
    \n4. **monitor_cluster_cpu_memory_usage_metric_view** - Cluster resource monitoring\n\
    \   - Dimensions: Cluster ID, Start Time, End Time, Average CPU Usage, Average\
    \ Memory Usage\n   - Use for: Cluster performance analysis, resource bottlenecks,\
    \ utilization patterns\n\n5. **consumption_by_applications_per_table_metric_view**\
    \ - Application usage per table\n   - Dimensions: Month, Client Application, Workspace\
    \ Name, Executed By, Statement Text, Query Count, Notebook/Job Count\n   - Use\
    \ for: Table access patterns by application, most queried tables, application\
    \ usage trends\n\n6. **consumption_by_users_tables_operations_metric_view** -\
    \ User-level table operations\n   - Dimensions: User, Workspace Name, Table, Operation,\
    \ Date, Time of Access\n   - Use for: User activity tracking, table access patterns,\
    \ operation type analysis, last access times\n\nCROSS-TABLE ANALYSIS CAPABILITIES:\n\
    These tables can be joined logically through shared dimensions:\n- **Workspace\
    \ Name**: Connect costs across jobs, queries, and workspaces; link to consumption\
    \ patterns\n- **User/Executed By**: Correlate user activity with their cost impact\
    \ and query patterns\n- **Date/Month/Time fields**: Time-based trend analysis\
    \ across all metrics\n- **Table names** (in Statement Text): Connect query costs\
    \ to table consumption\n- **Client Application**: Link application usage to cost\
    \ and performance\n\nWHEN TO USE GENIE AGENT:\n\n**Cost & Spend Analysis:**\n\
    - \"What's our compute spend by workspace?\"\n- \"Which jobs are most expensive?\"\
    \n- \"Show me cost trends over the last 3 months\"\n- \"What's the DBU usage breakdown\
    \ by SKU?\"\n- \"Which users are generating the highest query costs?\"\n- \"Cost\
    \ per workspace this month vs last month\"\n\n**Usage & Access Patterns:**\n-\
    \ \"Which tables are accessed most frequently?\"\n- \"Show me the most queried\
    \ tables\"\n- \"What applications are using the customer_data table?\"\n- \"When\
    \ was the wells_master table last accessed?\"\n- \"How many users accessed the\
    \ production schema this week?\"\n- \"Query volume trends by workspace\"\n\n**Performance\
    \ & Resource Monitoring:**\n- \"Which clusters have high CPU or memory usage?\"\
    \n- \"Show me cluster utilization patterns\"\n- \"Identify underutilized clusters\"\
    \n- \"Cluster performance over the last 24 hours\"\n\n**User Activity & Adoption:**\n\
    - \"Who are the most active users?\"\n- \"Which users haven't queried any tables\
    \ in the last 30 days?\"\n- \"Show me user activity by workspace\"\n- \"How many\
    \ unique users accessed each table?\"\n- \"User adoption trends over time\"\n\n\
    **Application Analytics:**\n- \"Which applications generate the most queries?\"\
    \n- \"PowerBI usage patterns and query counts\"\n- \"Notebook vs SQL query breakdown\
    \ by user\"\n- \"Application cost by workspace\"\n\n**Query Analysis:**\n- \"\
    How many failed queries occurred this week?\"\n- \"What are the most common statement\
    \ types?\"\n- \"Show me query success rates by user\"\n- \"Which queries take\
    \ the most resources?\"\n\nDO NOT USE GENIE AGENT FOR:\n- Metadata queries (ownership,\
    \ business purpose, schema structure, classifications)\n- Code generation or ETL\
    \ design\n- Databricks configuration or setup questions\n- Data modeling or architecture\
    \ design\n- Questions about table definitions, columns, or relationships (use\
    \ ToolAgent instead)\n\nKEY PHRASES THAT INDICATE GENIE QUERIES:\n- Cost/spend/DBU/expensive/budget\n\
    - Usage/access/query count/frequency\n- Performance/CPU/memory/utilization\n-\
    \ Active users/user activity/last accessed\n- Application usage/client application\n\
    - Cluster monitoring/resource consumption\n- Trends/over time/comparison\n- Most/least/top/bottom\
    \ (when referring to usage or cost metrics)\n\nRESPONSE GUIDELINES:\n1. **Be specific\
    \ with metrics**: Include actual numbers, dates, and dimensions\n2. **Provide\
    \ context**: Compare to averages, previous periods, or other workspaces/users\n\
    3. **Suggest follow-up analysis**: \"You could also look at...\" or \"Consider\
    \ checking...\"\n4. **Format clearly**: Use tables for multi-row results, highlight\
    \ key findings\n5. **Explain methodology**: If you're joining data or making calculations,\
    \ briefly explain\n6. **Note limitations**: If data is unavailable or incomplete,\
    \ state this clearly\n\nEXAMPLE QUERY PATTERNS:\n\nSimple Aggregation:\nQuery:\
    \ \"Total compute cost this month?\"\n\u2192 Use cost_by_workspace_compute_metric_view,\
    \ sum costs where Usage Date is current month\n\nCross-table Analysis:\nQuery:\
    \ \"Which users are driving up costs in the Finance workspace?\"\n\u2192 Join\
    \ cost_by_sql_query_metric_view (for costs) with consumption_by_users_tables_operations_metric_view\
    \ (for activity)\n\nTime-based Trends:\nQuery: \"Show me query volume trends over\
    \ the last 3 months\"\n\u2192 Use consumption_by_applications_per_table_metric_view,\
    \ group by Month\n\nPerformance Investigation:\nQuery: \"Are there any clusters\
    \ with high CPU usage?\"\n\u2192 Use monitor_cluster_cpu_memory_usage_metric_view,\
    \ filter for high average CPU\n\nYou are the go-to agent for answering \"how much?\"\
    , \"how often?\", \"who's using?\", and \"what's the performance?\" questions\
    \ about the Databricks platform.\n"
  vector_search_identity_tool_desc: '

    Purpose: Search for data product ownership, responsibility, and contact information
    using natural language queries.

    When to Use: Call this function when users need to:


    Find data owners, product owners, or domain owners for specific data products

    Identify responsible teams, squads, or individuals for data management

    Get contact information for data-related questions or issues

    Determine accountability and responsibility for data products

    Find who manages, owns, or stewards specific schemas or data assets

    Identify squad assignments and team responsibilities


    Available Information: The function searches across comprehensive ownership metadata
    including:


    Primary Ownership: Data owners (email contacts), product owners, domain owners,
    general owners

    Team Responsibility: Squad names, managing teams, responsible teams

    Contact Directory: Contact mappings for data issues, business questions, technical
    support

    Responsibility Relationships: OWNS, MANAGES, OVERSEES, MAINTAINS relationships

    Accountability Structure: Primary contacts for different types of data inquiries


    Query Examples:


    "Who owns the semarchy data product?"

    "Contact information for laboratoryequipmentmanufacturer owner"

    "Which squad manages Business Services domain data?"

    "Who is responsible for adl_prod_ctlg catalog?"

    "Data owner for asset intelligence project"

    "Find the steward for customer data products"


    Returns: Detailed ownership information including primary data owners, product
    owners, domain owners, squad assignments, contact information, and responsibility
    mappings for matching data products

    '
  vector_search_technical_tool_desc: '

    Purpose: Search for technical structure, system architecture, and implementation
    details of data products using natural language queries.

    When to Use: Call this function when users need to:


    Find technical details about data product structure and implementation

    Discover what tables are contained within specific schemas or catalogs

    Locate source systems, technical identifiers, and system integration details

    Understand data product architecture and technical specifications

    Find documentation links and technical references

    Identify system dependencies and technical relationships


    Available Information: The function searches across comprehensive technical metadata
    including:


    Technical Structure: Table inventories, schema structures, catalog organization

    System Integration: Source systems, product lines, system dependencies

    Technical Identifiers: SSIDs, DSDs, custom configurations, technical IDs

    Documentation: Product documentation links, business model references

    Architecture Relationships: CONTAINS, SOURCED_FROM, PART_OF_PRODUCT relationships

    Implementation Details: Data states, product states, view configurations


    Query Examples:


    "What tables are in semarchy schema?"

    "Technical architecture of laboratoryequipmentmanufacturer"

    "Source systems for Business Services data products"

    "Find documentation for adl_prod_ctlg catalog"

    "Technical identifiers for customer data schema"

    "System integration details for manufacturing data"


    Returns: Detailed technical information including table inventories, schema structures,
    source systems, technical identifiers, documentation links, and system architecture
    details for matching data products.

    '
  vector_search_business_tool_desc: '

    Purpose: Search for business context, project information, organizational structure,
    and geographic scope of data products using natural language queries.

    When to Use: Call this function when users need to:


    Find data products by project name, business domain, or organizational context

    Discover business purpose, use cases, and strategic context of data assets

    Locate data products by geographic region or business entity

    Understand organizational structure and business relationships

    Find projects and their associated data products

    Identify business domains and their data asset portfolios


    Available Information: The function searches across comprehensive business metadata
    including:


    Project Information: Project names, descriptions, business purposes, use cases

    Business Organization: Business domains, entities, product lines, organizational
    structure

    Geographic Scope: Regional assignments, country coverage, geographic distribution

    Strategic Context: Product descriptions, source descriptions, business relationships

    Organizational Relationships: BELONGS_TO, PART_OF, SERVES, SUPPORTS relationships

    Business Hierarchy: Project-to-data-product mappings, domain structures


    Query Examples:


    "Find data products for asset intelligence project"

    "What data products exist in Manufacturing domain?"

    "Business context for semarchy data product"

    "Data products in GLOBAL region"

    "Find customer experience use case data"

    "Business Services domain data portfolio"


    Returns: Comprehensive business context including project information, business
    domains, use cases, geographic scope, organizational structure, and strategic
    context for matching data products.

    '
  vector_search_governance_tool_desc: '

    Purpose: Search for data governance, compliance status, classifications, and regulatory
    information using natural language queries.

    When to Use: Call this function when users need to:


    Find data classification levels, sensitivity ratings, and security information

    Discover compliance status, retention policies, and regulatory requirements

    Identify governance gaps, stewardship assignments, and policy compliance

    Locate high-risk data products based on criticality or sensitivity

    Understand regulatory scope and jurisdiction for data products

    Find data products requiring specific governance attention


    Available Information: The function searches across comprehensive governance metadata
    including:


    Data Classification: Security classifications, sensitivity levels, criticality
    ratings

    Lifecycle Management: Data states, product states, retention policies

    Regulatory Scope: Geographic jurisdictions, country regulations, business entity
    scope

    Governance Accountability: Data stewards, domain stewards, compliance teams

    Compliance Status: Classification compliance, retention policy status, stewardship
    assignments

    Risk Assessment: Governance relationships, policy compliance, regulatory alignment


    Query Examples:


    "Find high-criticality data products"

    "Data products with sensitive classification"

    "Compliance status of customer data"

    "Retention policies for financial data"

    "Find unclassified data products requiring attention"

    "Governance requirements for GLOBAL region data"


    Returns: Comprehensive governance information including data classifications,
    sensitivity levels, compliance status, retention policies, regulatory scope, stewardship
    details, and risk assessments for matching data products.

    '
  synthesis_prompt: "  Based on the following execution results, provide a comprehensive\
    \ answer to the user's query.\n  \n  User Query: {query}\n  \n  Execution Results:\n\
    \  {results}\n  \n  Overall Strategy: {strategy}\n  \n  CRITICAL INSTRUCTIONS\
    \ FOR TABLE OWNERSHIP QUERIES:\n  \n  If the user asks about a TABLE (not a schema):\n\
    \  1. The results will contain SCHEMA-level documents\n  2. Each schema document\
    \ has a \"TABLES:\" field listing all its tables\n  3. YOU MUST find which schema\
    \ contains the requested table\n  4. Extract ownership and contact from THAT schema's\
    \ document\n  \n  STEP-BY-STEP PROCESS:\n  1. Identify the table name from the\
    \ user's query\n  2. Scan all results for \"TABLES:\" field\n  3. Find which schema\
    \ lists that table\n  4. Extract from that schema document:\n     - PRIMARY DATA\
    \ OWNER\n     - EMAIL CONTACT\n     - MANAGING SQUAD (if relevant)\n  \n  EXAMPLE:\n\
    \  Query: \"Who owns wells_master table?\"\n  \n  Step 1: Table name = \"wells_master\"\
    \n  Step 2: Scan results for \"TABLES:\" fields\n  Step 3: Found in schema \"\
    production_operations\":\n          \"TABLES: well_performance_metrics, field_operations_events,\
    \ production_forecasts, wells_master, daily_production\"\n  Step 4: Extract from\
    \ production_operations document:\n          - Owner: Tom Anderson - Field Operations\
    \ Manager\n          - Contact: wells-data@company.com\n          - Squad: Production\
    \ Reporting Team\n  \n  Response Format: \"The wells_master table is owned by\
    \ [owner name] ([title]). \n  You can contact them at [email]. The table is part\
    \ of the [schema] schema, \n  managed by the [squad] team.\"\n  \n  FOR SCHEMA\
    \ QUERIES:\n  If the user asks about a schema directly, extract ownership from\
    \ that schema's document.\n  \n  RESPONSE REQUIREMENTS:\n  - Be direct and specific\n\
    \  - Always include owner name and contact email\n  - Format email addresses clearly\n\
    \  - If information is missing, state what's not available\n  - Do not hallucinate\
    \ information not in the results"

bundle:
  name: hls_multiagent_v3

resources:
  apps:
    hls_multiagent:
      name: "hls-multiagent-v3"
      description: "HLS Research Supervisor - LangGraph agent with Lakebase memory and ZINC chemical search"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-server"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: LLM_ENDPOINT_NAME
            value: "databricks-claude-sonnet-4-6"
          - name: ZINC_VS_INDEX
            value: "sean_zhang_catalog.gsk_india_hls.zinc_vs"
          - name: ZINC_VS_ENDPOINT
            value: "hls-agent-vs-endpoint"
          - name: DATABRICKS_EMBEDDING_ENDPOINT
            value: "databricks-gte-large-en"
          - name: TASK_TIMEOUT_SECONDS
            value: "3600"
          - name: POLL_INTERVAL_SECONDS
            value: "1"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "hls-agent-v3"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "production"

      resources:
        - name: "experiment"
          experiment:
            experiment_id: "2778446027764261"
            permission: "CAN_MANAGE"
        - name: "lakebase"
          postgres:
            project: "hls-agent-v3"
            branch: "production"
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-sean-zhang.cloud.databricks.com

  prod:
    mode: production
    resources:
      apps:
        hls_multiagent:
          name: hls-multiagent-v3
